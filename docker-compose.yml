services:
  api:
    build:
      context: ./apps/api
    working_dir: /app
    ports:
      - "8000:8000"
    volumes:
      - ./apps/api:/app
      - api-var:/app/var
    command: >
      sh -lc "composer install &&
      mkdir -p var/storage/tmp var/storage/media &&
      php bin/console doctrine:migrations:migrate --no-interaction &&
      php -S 0.0.0.0:8000 -t public public/router.php"

volumes:
  api-var:
