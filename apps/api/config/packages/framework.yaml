framework:
  secret: '%env(APP_SECRET)%'
  http_method_override: false
  handle_all_throwables: true
  php_errors:
    log: true
  rate_limiter:
    upload_api:
      policy: fixed_window
      limit: 300
      interval: '1 minute'

when@test:
  framework:
    test: true
    rate_limiter:
      upload_api:
        policy: fixed_window
        limit: 10000
        interval: '1 minute'
